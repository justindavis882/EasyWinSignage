<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsportsSignage System</title>
    <style>
        /* Resets and Centering */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Deep Black */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        /* The "Blending" Title */
        h1 {
            color: #333333; /* Dark Gray */
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Button Styling */
        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Individual Colors */
        .btn-1 { background-color: #e63946; color: white; } /* Crimson */
        .btn-2 { background-color: #457b9d; color: white; } /* Steel Blue */
        .btn-3 { background-color: #2a9d8f; color: white; } /* Teal */

    </style>
</head>
<body>

    <div class="container">
        <h1>Please select your destination:</h1>
        <div class="button-group">
            <button class="btn-1" onclick="document.location='./public/receiver.html'">Receiver</button>
            <button class="btn-2" onclick="document.location='./public/dashboard.html'">Dashboard</button>
            <button class="btn-3" onclick="document.location='./public/admin.html'">Admin</button>
        </div>
    </div>

</body>

</html>
