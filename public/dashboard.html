<!DOCTYPE html>
<html>
<head>
    <title>EasyWin Signage Status Board</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --green: #27ae60; --red: #c0392b; --text: #ecf0f1; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 40px; 
        }

        header { 
            border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        h1 { margin: 0; font-weight: 700; letter-spacing: -1px; }
        .subtitle { color: #7f8c8d; margin-top: 5px; }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }

        .screen-card { 
            background: var(--card); border-radius: 12px; padding: 25px; 
            border: 1px solid #333; position: relative; overflow: hidden;
            transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .screen-card:hover { transform: translateY(-2px); border-color: #555; }

        .status-dot { 
            height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px;
        }
        .online { background-color: var(--green); box-shadow: 0 0 10px var(--green); }
        .offline { background-color: var(--red); }

        .screen-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
        .screen-meta { font-size: 0.85rem; color: #7f8c8d; font-family: monospace; }
        
        .now-playing { 
            margin-top: 20px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px;
            font-size: 0.9rem; color: #bdc3c7; display: flex; align-items: center; gap: 10px;
        }
        .icon { font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Screen Status Board</h1>
            <div class="subtitle">Live monitoring of signage network</div>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 1.5rem; color: #f1c40f;">--:--</div>
    </header>

    <div id="grid" class="grid"></div>

    <script>
        const socket = io();
        
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        socket.on('update_screen_list', (screens) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            screens.forEach(s => {
                const div = document.createElement('div');
                div.className = 'screen-card';
                
                // Content Icon logic
                let icon = "💤";
                let detail = "Idle";
                
                if(s.lastContent) {
                    const t = s.lastContent.type;
                    if(t === 'playlist') { icon = "📅"; detail = `Playlist (${s.lastContent.payload.length} items)`; }
                    if(t === 'image') { icon = "🖼️"; detail = "Single Image"; }
                    if(t === 'url') { icon = "🌐"; detail = "Website Mode"; }
                    if(t === 'photo-text') { icon = "📢"; detail = "Announcement"; }
                }

                div.innerHTML = `
                    <div style="display:flex; align-items:center; margin-bottom:10px;">
                        <span class="status-dot ${s.isPaired ? 'online' : 'offline'}"></span>
                        <span style="color:${s.isPaired ? '#2ecc71' : '#e74c3c'}; font-weight:bold; font-size:0.8rem; text-transform:uppercase;">
                            ${s.isPaired ? 'Online' : 'Disconnected'}
                        </span>
                    </div>
                    <div class="screen-name">${s.name || 'Unnamed Screen'}</div>
                    <div class="screen-meta">ID: ${s.socketId.substr(0,6)}...</div>
                    
                    <div class="now-playing">
                        <span class="icon">${icon}</span>
                        <span>${detail}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
            
            if(screens.length === 0) {
                grid.innerHTML = `<div style="text-align:center; color:#555; grid-column:1/-1;">No screens detected. Turn on a receiver to begin.</div>`;
            }
        });
    </script>
</body>
</html>
