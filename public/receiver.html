<!DOCTYPE html>
<html>
<head>
    <title>Signage Player</title>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #app { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Pairing Code Styles */
        .code-box { text-align: center; animation: pulse 3s infinite; }
        .code { font-size: 8rem; font-weight: 900; letter-spacing: 15px; color: #00ffcc; text-shadow: 0 0 30px rgba(0,255,204,0.5); }
        h2 { text-transform: uppercase; letter-spacing: 5px; color: #888; margin-bottom: 20px; }
        
        /* Fullscreen Content */
        iframe { width: 100%; height: 100%; border: none; }
        img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="app"><h1>Booting System...</h1></div>

    <script>
        const socket = io();
        const app = document.getElementById('app');
        let slideInterval;

        // --- IDENTITY MANAGEMENT ---
        const getDeviceId = () => {
            let id = localStorage.getItem('signage_deviceId');
            if (!id) {
                id = 'tv_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('signage_deviceId', id);
            }
            return id;
        };

        // --- CONNECTION ---
        socket.on('connect', () => {
            const myId = getDeviceId();
            console.log("Registered as:", myId);
            socket.emit('register_screen', myId);
        });

        // --- PAIRING MODE ---
        socket.on('show_pairing_code', (code) => {
            if (slideInterval) clearInterval(slideInterval);
            app.innerHTML = `<div class="code-box"><h2>System Pairing Code</h2><div class="code">${code}</div></div>`;
        });

        socket.on('paired_success', (data) => {
            app.innerHTML = `<h1>Connected: ${data.name}</h1>`;
        });

        // --- CONTENT ENGINE ---
        socket.on('update_content', (data) => {
            if (slideInterval) clearInterval(slideInterval);
            app.innerHTML = ''; 

            if (data.type === 'html') {
                app.innerHTML = data.payload;
            } 
            else if (data.type === 'url') {
                app.innerHTML = `<iframe src="${data.payload}"></iframe>`;
            }
            else if (data.type === 'slideshow') {
                const images = data.payload;
                let index = 0;
                
                const showSlide = () => {
                    // Simple fade transition by replacing HTML
                    app.innerHTML = `<img src="${images[index]}" style="background:black;">`;
                    index = (index + 1) % images.length;
                };

                showSlide();
                slideInterval = setInterval(showSlide, 5000); // 5 Seconds per slide
            }
        });
        
        // --- REMOTE COMMANDS ---
        socket.on('force_refresh', () => location.reload());
    </script>
</body>
</html>
