<!DOCTYPE html>
<html>
<head>
    <title>Signage Admin</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: monospace; display: flex; height: 100vh; margin: 0; }
        .panel { padding: 20px; width: 50%; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        .left { border-right: 2px solid #333; overflow-y: auto; }
        
        /* UI Elements */
        input, button, textarea, select { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { cursor: pointer; background: #0066cc; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        button:hover { background: #0055aa; }
        label { color: #888; font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .control-group { background: #252525; padding: 15px; border-radius: 4px; border: 1px solid #333; }
        
        /* Terminal */
        #terminal { flex-grow: 1; background: black; padding: 15px; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; color: #0f0; font-family: 'Courier New', courier; }
    </style>
</head>
<body>

    <!-- LEFT: CONTROLS -->
    <div class="panel left">
        <h1>Admin Control</h1>
        
        <!-- 1. PAIRING -->
        <div class="control-group">
            <label>1. Setup New Screen</label>
            <input type="text" id="pairCode" placeholder="Enter 6-digit Code">
            <input type="text" id="screenName" placeholder="Screen Name (e.g. Lobby)">
            <button onclick="pair()">Link Screen</button>
        </div>

        <!-- 2. TARGET SELECTION -->
        <div class="control-group">
            <label>2. Select Target Screen</label>
            <select id="screenSelect">
                <option value="">-- Waiting for Screens --</option>
            </select>
        </div>

        <!-- 3. CONTENT -->
        <div class="control-group">
            <label>3. Content Mode</label>
            
            <details open>
                <summary>Text / HTML</summary>
                <textarea id="htmlContent" rows="3" placeholder="<h1>Game Over</h1>"></textarea>
                <button onclick="push('html')">Push HTML</button>
            </details>

            <details>
                <summary>Website / Dashboard</summary>
                <input type="text" id="urlInput" placeholder="https://scoreboard.com">
                <button onclick="push('url')">Push URL</button>
            </details>

            <details>
                <summary>Slideshow</summary>
                <p style="font-size:0.8rem; margin:5px 0;">Paste Image URLs (one per line):</p>
                <textarea id="slideContent" rows="5" placeholder="https://site.com/img1.jpg&#10;https://site.com/img2.jpg"></textarea>
                <button onclick="push('slideshow')">Start Slideshow</button>
            </details>
        </div>
    </div>

    <!-- RIGHT: TERMINAL -->
    <div class="panel">
        <h2>System Terminal</h2>
        <div id="terminal">System Ready...<br></div>
        <input type="text" id="cliInput" placeholder="Type 'refresh' to reboot screens..." onkeydown="checkEnter(event)">
    </div>

    <script>
        const socket = io();
        const term = document.getElementById('terminal');
        const screenSelect = document.getElementById('screenSelect');

        // --- CORE FUNCTIONS ---
        function log(msg) { 
            term.innerHTML += `> ${msg}<br>`; 
            term.scrollTop = term.scrollHeight; 
        }

        function pair() {
            socket.emit('admin_pair', { 
                code: document.getElementById('pairCode').value,
                name: document.getElementById('screenName').value
            });
        }

        function push(type) {
            const targetId = screenSelect.value;
            if (!targetId) return log("ERROR: No screen selected!");

            let payload;
            if (type === 'html') payload = document.getElementById('htmlContent').value;
            if (type === 'url') payload = document.getElementById('urlInput').value;
            if (type === 'slideshow') {
                payload = document.getElementById('slideContent').value.split('\n').filter(line => line.trim() !== '');
            }

            socket.emit('push_content', { targetId, content: { type, payload } });
        }
        
        // --- SOCKET EVENTS ---
        socket.on('admin_log', log);
        socket.on('cli_response', log);

        socket.on('update_screen_list', (screens) => {
            const currentVal = screenSelect.value;
            screenSelect.innerHTML = '';
            
            // Only show screens that are paired
            const activeScreens = screens.filter(s => s.isPaired);

            activeScreens.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.socketId;
                opt.text = `${s.name}`;
                screenSelect.appendChild(opt);
            });

            if(activeScreens.length === 0) {
                const opt = document.createElement('option');
                opt.text = "No Paired Screens";
                screenSelect.appendChild(opt);
            } else {
                // Try to keep selection
                if(currentVal) screenSelect.value = currentVal;
            }
        });

        // --- TERMINAL INPUT ---
        function checkEnter(e) {
            if (e.key === 'Enter') {
                socket.emit('cli_command', e.target.value);
                e.target.value = '';
            }
        }
    </script>
</body>
</html>
