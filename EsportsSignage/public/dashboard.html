<!DOCTYPE html>
<html>
<head>
    <title>Esports Command Center</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #0f0; --dark-bg: #0a0a0a; --card-bg: #141414; }
        
        body { 
            background: var(--dark-bg); 
            color: #ccc; 
            font-family: 'Roboto Mono', monospace; 
            margin: 0; padding: 20px; 
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px;
        }
        
        h1 { margin: 0; color: white; text-transform: uppercase; letter-spacing: 2px; }
        .status-badge { background: #333; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-left: 5px solid #555; 
            padding: 20px; 
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card.active { border-left-color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }

        .card h2 { margin: 0 0 10px 0; color: white; font-size: 1.2rem; }
        .card .meta { font-size: 0.75rem; color: #666; margin-bottom: 15px; }
        
        .content-preview { 
            background: black; padding: 10px; border: 1px dashed #444; 
            color: var(--neon-green); font-size: 0.8rem; height: 60px; 
            overflow: hidden; word-break: break-all;
        }

        .actions { margin-top: 15px; display: flex; gap: 10px; }
        button { 
            background: #222; color: white; border: 1px solid #444; 
            padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.7rem; 
            text-transform: uppercase; flex-grow: 1;
        }
        button:hover { background: #333; border-color: #666; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Network Status</h1>
            <div id="clock" style="color:#666; font-size:0.9rem;">--:--:--</div>
        </div>
        <div class="status-badge" id="totalScreens">0 Screens Online</div>
    </header>

    <div id="grid" class="grid"></div>

    <script>
        const socket = io();
        
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        socket.on('update_screen_list', (screens) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.getElementById('totalScreens').innerText = `${screens.length} Screens Configured`;

            screens.forEach(s => {
                const isActive = true; // Assumed active if in list
                
                const div = document.createElement('div');
                div.className = `card ${isActive ? 'active' : 'offline'}`;
                
                // SAFE ID CHECK: Prevents crash if ID is missing
                const safeId = (s.deviceId || 'Unknown').toString();
                const shortId = safeId.length > 8 ? safeId.substr(0,8) : safeId;

                let preview = "Idle / Waiting";
                if(s.lastContent) {
                    if(s.lastContent.type === 'url') preview = `🌐 URL`;
                    if(s.lastContent.type === 'html') preview = `📄 HTML`;
                    if(s.lastContent.type === 'slideshow') preview = `🖼️ Slideshow (${s.lastContent.payload.length} img)`;
                }

                div.innerHTML = `
                    <h2>${s.name || 'Unnamed Screen'}</h2>
                    <div class="meta">ID: ${shortId}...</div>
                    <div class="content-preview">${preview}</div>
                    <div class="actions">
                        <button onclick="cmd('${s.socketId}', 'refresh')">Reboot</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        });

        function cmd(id, action) {
            if(action === 'refresh') socket.emit('cli_command', `refresh ${id}`);
        }
    </script>
</body>
</html>
